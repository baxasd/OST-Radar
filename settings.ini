[Hardware]
# Path to the Texas Instruments mmWave configuration file
radar_cfg_file = core/config.cfg

# Leave as "auto" to auto-detect, or specify exactly (e.g., COM3, /dev/ttyACM0)
cli_port = auto
data_port = auto

[Network]
# Port used for ZeroMQ Publisher/Subscriber communication
zmq_port = 5555

[Recording]
# How many frames to keep in RAM before flushing to the Parquet file on disk
chunk_size = 100

[Viewer]
# Default IP address of the Publisher (use 127.0.0.1 if on the same machine)
default_ip = 127.0.0.1

# Maximum distance to display on the Y-axis (in meters)
max_range_m = 5.0

# Colormap for the heatmap (options: inferno, viridis, plasma, magma, turbo)
cmap = inferno

# Noise floor percentile (0 to 100) - hides background static
low_pct = 40.0

# Ceiling percentile (0 to 100) - prevents hot pixels from washing out the image
high_pct = 99.5

# Grid size for bilinear upscaling (makes the blocky radar matrix look smooth)
smooth_grid_size = 250